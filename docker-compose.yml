version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: communityhero
      POSTGRES_PASSWORD: communityhero_dev
      POSTGRES_DB: communityhero
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U communityhero"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://communityhero:communityhero_dev@postgres:5432/communityhero
      REDIS_URL: redis://redis:6379/0
      JWT_PRIVATE_KEY: /app/keys/private.pem
      JWT_PUBLIC_KEY: /app/keys/public.pem
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-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}
      NVIDIA_MODEL: qwen/qwen3.5-122b-a10b
      NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: communityhero-media
      ENVIRONMENT: development
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - media_uploads:/app/uploads
    command: npm run dev
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-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}
      NVIDIA_MODEL: qwen/qwen3.5-122b-a10b
      NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai-service:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_AI_SERVICE_URL: http://localhost:8001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  media_uploads:
  minio_data: